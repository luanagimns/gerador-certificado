<div class="certificate-detail-container">
  <div class="top-controls">
    <app-back-button to="/lista"></app-back-button>
    <button class="btn-download" (click)="downloadCertificate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download
    </button>
  </div>

  <div *ngIf="certificate()" class="certificate-card">
    <div class="certificate-content">
      <!-- Top decoration with medal -->
      <div class="certificate-header">
        <div class="medal-icon">
          <img src="images/ribon.png" alt="Selo de conclusão" />
        </div>
      </div>

      <!-- Main content -->
      <div class="certificate-main">
        <h2 class="certificate-title">CERTIFICADO DE CONCLUSÃO</h2>
        <p class="certificate-subtitle">Este certificado comprova que</p>

        <h1 class="student-name">{{ certificate()?.studentName }}</h1>

        <p class="activity-intro">Concluiu com sucesso as seguintes atividades:</p>

        <div class="activities-section">
          <p class="activities-text">
            {{ getActivitiesText(certificate()?.activities || []) }}
          </p>
        </div>

        <!-- Bottom section with date and signature -->
        <div class="certificate-footer">
          <p class="emission-date">
            Emitido em {{ getFormattedDate(certificate()?.generatedDate) }}
          </p>
          <div class="signature">
            <svg viewBox="0 0 54 50" fill="none">
              <path d="M53.0004 36H9.33037C10.3304 34.0425 11.3754 31.9725 12.3829 29.86C16.1679 30.7475 20.9154 27.845 26.5179 21.2125C27.4354 24.3375 29.6504 29.92 33.7879 30H33.8754C36.0529 30 38.2854 28.4375 40.6654 25.235C41.7929 27.285 44.8279 30 53.0004 30C53.2656 30 53.5199 29.8946 53.7075 29.7071C53.895 29.5196 54.0004 29.2652 54.0004 29C54.0004 28.7348 53.895 28.4804 53.7075 28.2929C53.5199 28.1054 53.2656 28 53.0004 28C42.2804 28 42.0004 23.19 42.0004 23C42.0001 22.7847 41.9302 22.5752 41.8013 22.4027C41.6724 22.2302 41.4912 22.104 41.2847 22.0427C41.0783 21.9815 40.8576 21.9885 40.6554 22.0628C40.4533 22.1371 40.2805 22.2746 40.1629 22.455C37.1854 27.025 35.1054 28 33.8704 28H33.8254C30.5754 27.9375 28.5029 21.37 27.9804 18.8475C27.9405 18.6639 27.8497 18.4952 27.7184 18.3608C27.587 18.2264 27.4205 18.1317 27.2378 18.0876C27.0552 18.0435 26.8638 18.0518 26.6856 18.1114C26.5074 18.1711 26.3496 18.2798 26.2304 18.425C20.9954 24.9925 16.4654 28.3125 13.2804 27.975C19.3279 14.875 21.2979 6.29 19.1229 2.4425C18.5004 1.3275 17.1754 0 14.4779 0C11.0229 0 8.13537 3.6025 6.75037 9.635C5.8831 13.4468 5.75243 17.3892 6.36537 21.25C7.02536 25.0725 8.46287 27.7625 10.5379 29.0875C9.39287 31.4875 8.21287 33.8375 7.07787 36.0075H1.00036C0.735148 36.0075 0.480794 36.1129 0.293258 36.3004C0.105721 36.4879 0.000364427 36.7423 0.000364427 37.0075C0.000364427 37.2727 0.105721 37.5271 0.293258 37.7146C0.480794 37.9021 0.735148 38.0075 1.00036 38.0075H6.02536C2.80786 44.05 0.182864 48.4275 0.142864 48.4925C0.0751986 48.6051 0.0303816 48.7299 0.0109736 48.8599C-0.0084344 48.9898 -0.00205264 49.1223 0.0297538 49.2497C0.0615603 49.3772 0.118168 49.4971 0.196344 49.6027C0.274519 49.7083 0.37273 49.7974 0.485365 49.865C0.641335 49.9565 0.819545 50.0033 1.00036 50C1.173 50.0001 1.34271 49.9554 1.49298 49.8704C1.64325 49.7854 1.76896 49.663 1.85786 49.515C1.89786 49.4475 4.82037 44.5775 8.28787 38H53.0004C53.2656 38 53.5199 37.8946 53.7075 37.7071C53.895 37.5196 54.0004 37.2652 54.0           </div>
        </div>
      </div>
    </div>
  </div>
